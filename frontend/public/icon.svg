<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>

  <!-- Ledger document shape -->
  <rect x="38" y="30" width="90" height="108" rx="10" fill="white" fill-opacity="0.08" stroke="white" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Ledger lines (left column) -->
  <rect x="52" y="52" width="28" height="5" rx="2.5" fill="white" fill-opacity="0.9"/>
  <rect x="52" y="68" width="28" height="5" rx="2.5" fill="white" fill-opacity="0.9"/>
  <rect x="52" y="84" width="28" height="5" rx="2.5" fill="white" fill-opacity="0.9"/>
  <rect x="52" y="100" width="28" height="5" rx="2.5" fill="white" fill-opacity="0.9"/>
  <rect x="52" y="116" width="28" height="5" rx="2.5" fill="white" fill-opacity="0.9"/>

  <!-- Ledger lines (right column, values) -->
  <rect x="90" y="52" width="22" height="5" rx="2.5" fill="white" fill-opacity="0.5"/>
  <rect x="90" y="68" width="22" height="5" rx="2.5" fill="white" fill-opacity="0.5"/>
  <rect x="90" y="84" width="22" height="5" rx="2.5" fill="white" fill-opacity="0.5"/>
  <rect x="90" y="100" width="22" height="5" rx="2.5" fill="white" fill-opacity="0.5"/>

  <!-- Gold total line at bottom -->
  <rect x="90" y="116" width="22" height="5" rx="2.5" fill="url(#gold)"/>
  <rect x="52" y="128" width="60" height="2" rx="1" fill="white" fill-opacity="0.3"/>

  <!-- Upward trend arrow (right side overlay) -->
  <path d="M138 115 L138 62 M138 62 L128 72 M138 62 L148 72"
    stroke="#34D399" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Flow wave at bottom -->
  <path d="M22 152 Q45 140 68 152 Q91 164 114 152 Q137 140 158 152"
    stroke="white" stroke-width="3.5" stroke-linecap="round"
    fill="none" stroke-opacity="0.35"/>
</svg>
